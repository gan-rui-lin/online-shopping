server:
  port: 8080

spring:
  rabbitmq:
    listener:
      simple:
        auto-startup: ${SPRING_RABBITMQ_LISTENER_AUTO_STARTUP:false}

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/online_shopping?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms
    elasticsearch:
      repositories:
        enabled: ${APP_SEARCH_ES_ENABLED:true}

  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
    username: ${ES_USERNAME:elastic}
    password: ${ES_PASSWORD:}

app:
  search:
    es:
      enabled: ${APP_SEARCH_ES_ENABLED:true}
  ai:
    enabled: ${APP_AI_ENABLED:false}
    base-url: ${APP_AI_BASE_URL:https://openrouter.ai/api/v1/chat/completions}
    api-key: ${APP_AI_API_KEY:}
    model: ${APP_AI_MODEL:deepseek/deepseek-chat-v3-0324:free}
    timeout-ms: ${APP_AI_TIMEOUT_MS:20000}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1000ms
          multiplier: 2
          max-attempts: 3

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.helloworld.onlineshopping.modules.*.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-underline: true
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT
jwt:
  secret: ${JWT_SECRET:YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwYWJjZGVmZw==}
  expiration: 86400000
  token-head: "Bearer "
  header: Authorization

# Knife4j
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.helloworld.onlineshopping: debug
    com.baomidou.mybatisplus: debug

# OSS Configuration
oss:
  endpoint: http://localhost:9000
  bucket: test-bucket
  access-key: testuser
  secret-key: testpass
  cdn-domain: ""  # 本地测试不用 CDN

# File Upload Configuration
#file:
#  upload:
#    max-size: 10MB
#    allowed-types: image/jpeg,image/png,image/gif,image/webp
#    temp-dir: ${TEMP_DIR:/tmp/uploads}
#    cleanup-interval: 3600000  # 1 hour in milliseconds
file:
  upload:
    max-size: 10MB
    allowed-types: image/jpeg,image/png,image/gif,image/webp
    temp-dir: ./tmp/uploads  # 使用项目本地目录，方便查看
    cleanup-interval: 60000  # 1 分钟清理一次临时文件，测试方便

order:
  timeout:
    delay-ms: ${ORDER_TIMEOUT_DELAY_MS:1800000}
